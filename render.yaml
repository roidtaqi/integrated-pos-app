services:
  - type: web
    name: inventory-pricing-app
    runtime: static
    repo: https://github.com/roidtaqi/inventory-pricing-app.git
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SYNC_URL
        value: wss://integrated-pos-sync-server.onrender.com
      - key: VITE_SYNC_API_TOKEN
        fromService:
          name: integrated-pos-sync-server
          type: web
          envVarKey: SYNC_API_TOKEN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /service-worker.js
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  - type: web
    name: integrated-pos-app
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SYNC_URL
        value: wss://integrated-pos-sync-server.onrender.com
      - key: VITE_SYNC_API_TOKEN
        fromService:
          name: integrated-pos-sync-server
          type: web
          envVarKey: SYNC_API_TOKEN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /service-worker.js
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  - type: web
    name: integrated-pos-sync-server
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci
    startCommand: npm run sync:server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SYNC_API_TOKEN
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kastur-postgres
          property: connectionString

databases:
  - name: kastur-postgres
    plan: free
    region: singapore
    databaseName: kastur
    user: kastur
