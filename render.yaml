services:
  - type: web
    name: inventory-pricing-app
    runtime: static
    repo: https://github.com/roidtaqi/inventory-pricing-app.git
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /service-worker.js
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  - type: web
    name: integrated-pos-app
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /service-worker.js
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  - type: web
    name: integrated-pos-sync-server
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci
    startCommand: npm run sync:server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
